<div id="chat-widget" class="position-fixed bottom-0 end-0 mb-4 me-4" style="z-index: 1000;">
    <!-- Botón flotante -->
    <button id="chat-toggle" class="btn btn-primary rounded-circle shadow-lg p-3" style="width: 60px; height: 60px;"
        onclick="toggleChat()">
        <i class="bi bi-chat-dots-fill fs-4"></i>
    </button>

    <!-- Ventana de Chat -->
    <div id="chat-window" class="card shadow-lg" style="width: 350px; display: none; height: 450px;">
        <div class="card-header bg-primary text-white d-flex justify-content-between align-items-center">
            <h5 class="mb-0 fs-6"><i class="bi bi-robot"></i> MathBot</h5>
            <button type="button" class="btn-close btn-close-white btn-sm" onclick="toggleChat()"></button>
        </div>
        <div class="card-body d-flex flex-column">
            <div id="chat-messages" class="flex-grow-1 overflow-auto mb-3" style="font-size: 0.9rem;">
                <div class="d-flex justify-content-start mb-2">
                    <div class="bg-light p-2 rounded">¡Hola! Soy MathBot. ¿En qué puedo ayudarte con esta lección?</div>
                </div>
            </div>
            <div class="input-group">
                <input type="text" id="chat-input" class="form-control form-control-sm" placeholder="Escribe tu duda..."
                    onkeypress="handleEnter(event)">
                <button class="btn btn-primary btn-sm" onclick="sendMessage()"><i class="bi bi-send"></i></button>
            </div>
        </div>
    </div>
</div>

<script>
    function toggleChat() {
        const window = document.getElementById('chat-window');
        const btn = document.getElementById('chat-toggle');
        if (window.style.display === 'none') {
            window.style.display = 'block';
            btn.style.display = 'none';
        } else {
            window.style.display = 'none';
            btn.style.display = 'block';
        }
    }

    function handleEnter(e) {
        if (e.key === 'Enter') sendMessage();
    }

    async function sendMessage() {
        const input = document.getElementById('chat-input');
        const messages = document.getElementById('chat-messages');
        const msg = input.value.trim();
        if (!msg) return;

        // User message
        messages.innerHTML += `
            <div class="d-flex justify-content-end mb-2">
                <div class="bg-primary text-white p-2 rounded">${msg}</div>
            </div>`;
        input.value = '';
        messages.scrollTop = messages.scrollHeight;

        // Loading
        const loadingId = 'loading-' + Date.now();
        messages.innerHTML += `
            <div id="${loadingId}" class="d-flex justify-content-start mb-2">
                <div class="bg-light p-2 rounded text-muted">Thinking...</div>
            </div>`;
        messages.scrollTop = messages.scrollHeight;

        try {
            const response = await fetch("{{ url_for('cursos.api_chat_educativo') }}", {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    mensaje: msg,
                    contexto: "{{ leccion.titulo }} - {{ leccion.curso.titulo }}"
                })
            });
            const data = await response.json();

            document.getElementById(loadingId).remove();

            // Bot message
            messages.innerHTML += `
                <div class="d-flex justify-content-start mb-2">
                    <div class="bg-light p-2 rounded">${data.respuesta}</div>
                </div>`;

            // Renderizar ecuaciones KaTeX en el nuevo mensaje
            if (typeof renderizarMatematicas === 'function') {
                renderizarMatematicas(messages);
            }

        } catch (error) {
            document.getElementById(loadingId).innerHTML = '<div class="bg-danger text-white p-2 rounded">Error de conexión.</div>';
        }
        messages.scrollTop = messages.scrollHeight;
    }
</script>
