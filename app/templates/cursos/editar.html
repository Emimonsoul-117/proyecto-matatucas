{% extends "base.html" %}

{% block content %}
<div class="container py-4" style="max-width: 700px;">
    <div class="card border-0 shadow-sm" style="border-radius: 18px;">
        <div class="card-body p-4">
            <div class="mb-4">
                <h2 class="fw-bold mb-1"><i class="bi bi-pencil-square me-2 text-warning"></i>Editar Curso</h2>
                <p class="text-muted mb-0">{{ curso.titulo }}</p>
            </div>

            <form method="POST">
                <input type="hidden" name="csrf_token" value="{{ csrf_token() }}"/>

                <div class="mb-3">
                    <label for="titulo" class="form-label fw-semibold">Título del Curso</label>
                    <input type="text" class="form-control form-control-lg" id="titulo" name="titulo"
                        value="{{ curso.titulo }}" required maxlength="150">
                </div>

                <div class="mb-3">
                    <label for="descripcion" class="form-label fw-semibold">Descripción</label>
                    <textarea class="form-control" id="descripcion" name="descripcion"
                        rows="4">{{ curso.descripcion }}</textarea>
                </div>

                <div class="row g-3 mb-3">
                    <div class="col-md-6">
                        <label for="nivel" class="form-label fw-semibold">Nivel de Dificultad</label>
                        <select class="form-select" id="nivel" name="nivel" required>
                            <option value="basico" {% if curso.nivel=='basico' %}selected{% endif %}>🟢 Básico</option>
                            <option value="intermedio" {% if curso.nivel=='intermedio' %}selected{% endif %}>🟡 Intermedio</option>
                            <option value="avanzado" {% if curso.nivel=='avanzado' %}selected{% endif %}>🔴 Avanzado</option>
                        </select>
                    </div>
                    <div class="col-md-6">
                        <label for="visibilidad" class="form-label fw-semibold">Visibilidad</label>
                        <select class="form-select" id="visibilidad" name="visibilidad" required>
                            <option value="privado" {% if curso.visibilidad=='privado' %}selected{% endif %}>🔒 Privado (solo por código)</option>
                            <option value="global" {% if curso.visibilidad=='global' %}selected{% endif %}>🌐 Global (visible en catálogo)</option>
                        </select>
                        <div class="form-text">
                            <small><strong>Privado:</strong> Solo accesible con código de curso.<br>
                            <strong>Global:</strong> Visible para todos los estudiantes en el catálogo.</small>
                        </div>
                    </div>
                </div>

                <div class="d-flex gap-2 justify-content-end">
                    <a href="{{ url_for('cursos.ver_curso', id=curso.id) }}"
                        class="btn btn-outline-secondary">Cancelar</a>
                    <button type="submit" class="btn btn-primary px-4">
                        <i class="bi bi-check-lg me-1"></i>Guardar Cambios
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
