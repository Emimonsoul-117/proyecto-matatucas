{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="card shadow">
            <div class="card-header bg-primary text-white">
                <h4 class="mb-0">Crear Nuevo Curso</h4>
            </div>
            <div class="card-body">
                <form method="POST">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}"/>
                    <div class="mb-3">
                        <label for="titulo" class="form-label">Título del Curso</label>
                        <input type="text" class="form-control" id="titulo" name="titulo" required
                            placeholder="Ej: Álgebra Lineal Básica">
                    </div>

                    <div class="mb-3">
                        <label for="descripcion" class="form-label">Descripción</label>
                        <textarea class="form-control" id="descripcion" name="descripcion" rows="4"
                            placeholder="Describe lo que aprenderán los estudiantes..."></textarea>
                    </div>

                    <div class="mb-3">
                        <label for="nivel" class="form-label">Nivel de Dificultad</label>
                        <select class="form-select" id="nivel" name="nivel" required>
                            <option value="basico">Básico</option>
                            <option value="intermedio">Intermedio</option>
                            <option value="avanzado">Avanzado</option>
                        </select>
                    </div>

                    <div class="d-grid gap-2 d-md-flex justify-content-md-end">
                        <a href="{{ url_for('cursos.lista_cursos') }}" class="btn btn-secondary me-md-2">Cancelar</a>
                        <button type="submit" class="btn btn-success">Guardar Curso</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
